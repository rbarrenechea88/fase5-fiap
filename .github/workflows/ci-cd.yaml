name: CI/CD Pipeline - SolidaryTech

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository_owner }}

jobs:
  security-scan:
    name: DevSecOps - SAST/SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  build-donation-service:
    name: Build donation-service
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push donation-service
        uses: docker/build-push-action@v5
        with:
          context: ./donation-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/donation-service:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/donation-service:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/donation-service:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  build-ngo-service:
    name: Build ngo-service
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ngo-service
        uses: docker/build-push-action@v5
        with:
          context: ./ngo-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/ngo-service:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/ngo-service:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/ngo-service:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  build-volunteer-service:
    name: Build volunteer-service
    runs-on: ubuntu-latest
    needs: security-scan
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push volunteer-service
        uses: docker/build-push-action@v5
        with:
          context: ./volunteer-service
          push: ${{ github.event_name == 'push' }}
          tags: |
            ${{ env.IMAGE_PREFIX }}/volunteer-service:${{ github.sha }}
            ${{ env.IMAGE_PREFIX }}/volunteer-service:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.IMAGE_PREFIX }}/volunteer-service:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  deploy:
    name: Update GitOps manifests
    runs-on: ubuntu-latest
    needs: [build-donation-service, build-ngo-service, build-volunteer-service]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Update image tags in K8s manifests
        run: |
          sed -i "s|image:.*donation-service.*|image: ${{ env.IMAGE_PREFIX }}/donation-service:${{ github.sha }}|" k8s/donation-service.yaml
          sed -i "s|image:.*ngo-service.*|image: ${{ env.IMAGE_PREFIX }}/ngo-service:${{ github.sha }}|" k8s/ngo-service.yaml
          sed -i "s|image:.*volunteer-service.*|image: ${{ env.IMAGE_PREFIX }}/volunteer-service:${{ github.sha }}|" k8s/volunteer-service.yaml

      - name: Commit and push updated manifests
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          git diff --staged --quiet || git commit -m "chore: update image tags to ${{ github.sha }}"
          git push
