name: CI/CD Pipeline - SolidaryTech

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 445567109642.dkr.ecr.us-east-1.amazonaws.com

jobs:
  security-scan:
    name: DevSecOps - SAST/SCA
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (repo)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          severity: 'CRITICAL,HIGH'

  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: security-scan
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    strategy:
      matrix:
        service: [ngo-service, donation-service, volunteer-service]
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push ${{ matrix.service }}
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          push: true
          tags: |
            ${{ env.ECR_REGISTRY }}/solidarytech/${{ matrix.service }}:${{ github.sha }}
            ${{ env.ECR_REGISTRY }}/solidarytech/${{ matrix.service }}:latest

      - name: Trivy image scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ env.ECR_REGISTRY }}/solidarytech/${{ matrix.service }}:${{ github.sha }}'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'

  deploy:
    name: Update K8s manifests
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Update kubeconfig
        run: aws eks update-kubeconfig --name solidarytech-eks --region ${{ env.AWS_REGION }}

      - name: Deploy to EKS
        run: |
          sed -i "s|image:.*ngo-service.*|image: ${{ env.ECR_REGISTRY }}/solidarytech/ngo-service:${{ github.sha }}|" k8s/ngo-service.yaml
          sed -i "s|image:.*donation-service.*|image: ${{ env.ECR_REGISTRY }}/solidarytech/donation-service:${{ github.sha }}|" k8s/donation-service.yaml
          sed -i "s|image:.*volunteer-service.*|image: ${{ env.ECR_REGISTRY }}/solidarytech/volunteer-service:${{ github.sha }}|" k8s/volunteer-service.yaml
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/ngo-service.yaml
          kubectl apply -f k8s/donation-service.yaml
          kubectl apply -f k8s/volunteer-service.yaml
