apiVersion: velero.io/v1
kind: Schedule
metadata:
  name: solidarytech-daily-backup
  namespace: velero
spec:
  schedule: "0 2 * * *"
  template:
    includedNamespaces:
      - solidarytech
    storageLocation: default
    volumeSnapshotLocations:
      - default
    ttl: 720h0m0s
    includedResources:
      - deployments
      - services
      - configmaps
      - secrets
      - persistentvolumeclaims
  useOwnerReferencesInBackup: false
---
apiVersion: velero.io/v1
kind: BackupStorageLocation
metadata:
  name: default
  namespace: velero
spec:
  provider: aws
  objectStorage:
    bucket: solidarytech-velero-backups
    prefix: backups
  config:
    region: us-east-1
