apiVersion: apps/v1
kind: Deployment
metadata:
  name: ngo-service
  namespace: solidarytech
  labels:
    app: ngo-service
    tier: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ngo-service
  template:
    metadata:
      labels:
        app: ngo-service
        tier: backend
    spec:
      containers:
        - name: ngo-service
          image: 445567109642.dkr.ecr.us-east-1.amazonaws.com/solidarytech/ngo-service:latest
          ports:
            - containerPort: 8081
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: ngo-db-secret
                  key: url
          resources:
            requests:
              cpu: "80m"
              memory: "128Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: ngo-service
  namespace: solidarytech
  labels:
    app: ngo-service
spec:
  selector:
    app: ngo-service
  ports:
    - port: 80
      targetPort: 8081
      protocol: TCP
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ngo-service-hpa
  namespace: solidarytech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ngo-service
  minReplicas: 2
  maxReplicas: 6
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
