apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: solidarytech
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/dougls/hackathon-DCLT.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: solidarytech
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 3
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
